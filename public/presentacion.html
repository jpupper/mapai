<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Presentación — Nube de Universos</title>
    <link rel="stylesheet" href="css/presentacion.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</head>

<body>
    <div id="shader-bg"></div>
    <div class="scanline"></div>
    <div class="vignette"></div>

    <header class="pres-header">
        <a href="index.html" class="back-btn">← VOLVER</a>
        <div class="pres-title">MODO PRESENTACIÓN</div>
        <a id="profile-link" class="back-btn profile-link" href="profile.html" style="opacity:0.7;">Perfil</a>
    </header>

    <div id="presentation-container">
        <div class="slide-content" id="slide-content">
            <div class="slide-category-badge" id="slide-category"></div>
            <h1 class="slide-title" id="slide-title"></h1>
            <div class="slide-desc" id="slide-desc"></div>
            <div class="slide-meta" id="slide-meta"></div>
            <div class="slide-tags" id="slide-tags"></div>
        </div>
        <div class="slide-visual" id="slide-visual">
            <!-- Node Image will be injected here -->
        </div>
    </div>

    <div class="controls">
        <button id="prev-btn" class="nav-btn">←</button>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <button id="next-btn" class="nav-btn">→</button>
    </div>

    <div class="category-sidebar" id="category-filter">
        <button id="sidebar-toggle" class="sidebar-toggle">✕</button>
        <!-- Categories injected here -->
    </div>

    <button id="mobile-menu-btn" class="mobile-menu-btn">MENU</button>


    <div id="loading-overlay">
        <div class="loader">Loading Data...</div>
    </div>

    <!-- Fullscreen Image Modal -->
    <div id="image-modal" class="image-modal">
        <span class="modal-close" id="modal-close">&times;</span>
        <img class="modal-content" id="modal-img">
        <div id="modal-caption"></div>
    </div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
    </script>

    <script>
      // Universal profile/auth button
      (function() {
        const profileLink = document.getElementById('profile-link');
        if (profileLink) {
          const user = typeof getUser === 'function' ? getUser() : null;
          const loggedIn = typeof isLoggedIn === 'function' && isLoggedIn();
          if (loggedIn && user && user.username) {
            profileLink.textContent = '👤 ' + user.username;
            profileLink.href = 'profile.html';
          } else {
            profileLink.textContent = 'Ingresar';
            profileLink.href = '#';
            profileLink.onclick = function(e) {
              e.preventDefault();
              if (typeof showLogin === 'function') showLogin();
            };
          }
        }
      })();
    </script>

    <script type="module" src="js/presentacion.js"></script>
</body>

</html>
