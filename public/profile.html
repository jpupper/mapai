<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil — MapAI</title>
  <link rel="stylesheet" href="css/profile.css" />
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <div class="row">
        <div class="brand">
          <h1>Mi perfil</h1>
          <div class="sub">Mis mapas y accesos rápidos</div>
        </div>
        <nav class="nav">
          <button id="btn-account" class="btn-ghost" type="button">
            <span id="account-badge" class="acct-badge" style="display:none;"></span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"></circle>
              <path d="M4 20c1.7-3.5 4.7-5.2 8-5.2s6.3 1.7 8 5.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
            </svg>
            <span id="account-label">Cuenta</span>
          </button>
          <a id="link-home" class="btn" href="#">Inicio</a>
          <a id="link-admin" class="btn" href="#">Admin</a>
          <a id="link-community" class="btn" href="#">Comunidad</a>
          <button id="btn-logout" class="btn danger" type="button" style="display:none;">Salir</button>
        </nav>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">
      <section class="card">
        <div id="auth-status" class="muted"></div>
        <div id="login-cta" style="display:none; margin-top:12px;">
          <a id="link-login" class="btn primary" href="#">Iniciar sesión</a>
        </div>
      </section>

      <section class="card" id="json-import-section" style="display:none;">
        <h2 style="font-size:18px; margin-bottom:6px;">Importar mapa desde JSON</h2>
        <p class="muted" style="font-size:13px; margin-bottom:10px;">Pegá un JSON válido de un mapa para crear un nuevo proyecto.</p>
        <textarea id="json-input" class="json-input" placeholder='{"project":{"name":"Mi mapa"},"nodes":{"root":{"label":"Mi mapa","type":"root"}},"categories":[],"categoryChildren":{},"config":{}}'></textarea>
        <div style="display:flex; gap:8px; margin-top:10px;">
          <button id="btn-import-json" class="btn primary" type="button">Crear mapa desde JSON</button>
          <span id="json-import-status" class="muted" style="display:none;"></span>
        </div>
      </section>

      <section class="card">
        <h2 style="font-size:18px; margin-bottom:6px;">Mis mapas</h2>
        <div id="projects" class="list"></div>
      </section>
    </div>
  </main>

  <script src="js/profile.js"></script>
</body>
</html>
