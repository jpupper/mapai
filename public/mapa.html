<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <style>
    html, body { height: 100%; margin:0; }
    .wrap { height: 100%; display: flex; flex-direction: column; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding: 8px 14px;
      background: rgba(0,0,0,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar-left { display:flex; align-items:center; gap:16px; }
    .topbar-left h1 { margin:0; font-size:15px; letter-spacing:1px; color:#fff; font-weight:600; }
    .nav-links { display:flex; gap:4px; align-items:center; }
    .nav-links a {
      padding: 4px 10px;
      font-size: 0.78rem;
      font-family: 'Outfit', 'Montserrat', sans-serif;
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .nav-links a:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(120,180,255,0.4);
      color: #fff;
    }
    .nav-links a.active {
      background: rgba(120,180,255,0.15);
      border-color: rgba(120,180,255,0.5);
      color: #6cb4ff;
    }
    .topbar-right { display:flex; align-items:center; gap:8px; }
    .btn {
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: all 0.2s ease;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(120,180,255,0.5); }
    .btn-profile {
      background: rgba(120,180,255,0.12);
      border-color: rgba(120,180,255,0.3);
      color: #6cb4ff;
    }
    .btn-profile:hover {
      background: rgba(120,180,255,0.25);
      border-color: rgba(120,180,255,0.6);
      color: #8fcbff;
    }
    .frame { flex: 1; width: 100%; border: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="topbar-left">
        <h1>MAPA</h1>
        <nav class="nav-links">
          <a id="nav-mapa" class="active" href="#">MAPA</a>
          <a id="nav-nube" href="#">Nube de Universos</a>
          <a id="nav-presentacion" href="#">Presentación</a>
        </nav>
      </div>
      <div class="topbar-right">
        <button id="btn-back" class="btn" type="button">← Volver</button>
        <a id="btn-profile" class="btn btn-profile" href="profile.html">Perfil</a>
      </div>
    </div>
    <iframe id="map-frame" class="frame" title="Mapa"></iframe>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const project = urlParams.get('project') || 'diplomatura';
    const parts = window.location.pathname.split('/').filter(Boolean);
    const app = parts[0];
    const base = (app === 'mapai') ? '/' + app : '';
    const src = base + '/mapa.html?project=' + encodeURIComponent(project);
    document.getElementById('map-frame').src = src;

    // Back button
    document.getElementById('btn-back').addEventListener('click', function() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'index.html';
      }
    });

    // Nav links - point to the correct URLs
    document.getElementById('nav-mapa').href = base + '/mapa.html?project=' + encodeURIComponent(project);
    document.getElementById('nav-nube').href = base + '/nube_data/nube_universos.html?project=' + encodeURIComponent(project);
    document.getElementById('nav-presentacion').href = base + '/presentacion.html?project=' + encodeURIComponent(project) + '&node=root';

    // Universal profile/auth button
    var profileBtn = document.getElementById('btn-profile');
    var user = typeof getUser === 'function' ? getUser() : null;
    var loggedIn = typeof isLoggedIn === 'function' && isLoggedIn();
    if (loggedIn && user && user.username) {
      profileBtn.textContent = '\u{1F464} ' + user.username;
      profileBtn.href = 'profile.html';
    } else {
      profileBtn.textContent = 'Ingresar';
      profileBtn.href = '#';
      profileBtn.onclick = function(e) {
        e.preventDefault();
        if (typeof showLogin === 'function') showLogin();
      };
    }
  </script>
</body>
</html>
