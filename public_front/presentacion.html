<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modo Presentación — MapAI</title>
  <link rel="stylesheet" href="shared/css/presentacion.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="shader-bg"></div>
  <div class="scanline"></div>
  <div class="vignette"></div>

  <header class="pres-header">
    <a href="./" class="back-btn">← VOLVER</a>
    <div class="pres-title">MODO PRESENTACIÓN</div>
    <a id="profile-link-front" href="mapai/profile.html" class="back-btn" style="opacity:0.7;">Perfil</a>
  </header>
  <script src="js/menu.js"></script>
  <script>
    (function() {
      var btn = document.getElementById('profile-link-front');
      if (btn) {
        var user = typeof getUser === 'function' ? getUser() : null;
        var loggedIn = typeof isLoggedIn === 'function' && isLoggedIn();
        if (loggedIn && user && user.username) {
          btn.textContent = '\u{1F464} ' + user.username;
          btn.href = 'mapai/profile.html';
        } else {
          btn.textContent = 'Ingresar';
          btn.href = '#';
          btn.onclick = function(e) {
            e.preventDefault();
            if (typeof showLogin === 'function') showLogin();
          };
        }
      }
    })();
  </script>

  <div id="presentation-container">
    <div class="slide-content" id="slide-content">
      <div class="slide-category-badge" id="slide-category"></div>
      <h1 class="slide-title" id="slide-title"></h1>
      <div class="slide-desc" id="slide-desc"></div>
      <div class="slide-meta" id="slide-meta"></div>
      <div class="slide-tags" id="slide-tags"></div>
    </div>
    <div class="slide-visual" id="slide-visual"></div>
  </div>

  <div class="controls">
    <button id="prev-btn" class="nav-btn">←</button>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <button id="next-btn" class="nav-btn">→</button>
  </div>

  <div class="category-sidebar" id="category-filter">
    <button id="sidebar-toggle" class="sidebar-toggle">✕</button>
  </div>

  <button id="mobile-menu-btn" class="mobile-menu-btn">MENU</button>

  <div id="loading-overlay">
    <div class="loader">Loading Data...</div>
  </div>

  <div id="image-modal" class="image-modal">
    <span class="modal-close" id="modal-close">&times;</span>
    <img class="modal-content" id="modal-img">
    <div id="modal-caption"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module" src="shared/js/presentacion.js"></script>
</body>
</html>
